<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T.I. CAD BRPR01 | Base de Conhecimento</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  </head>
  <body>
    <div id="toast-container" class="toast-container"></div>

    <nav class="navbar">
      <div class="logo">
        <i class="ph ph-hard-drives"></i>
        <span>T.I. CAD BRPR01</span>
      </div>
      <div class="nav-actions">
        <button id="btn-show-add" class="btn btn-primary admin-only">
          <i class="ph ph-plus"></i> Novo Card
        </button>
        <button id="btn-login" class="btn btn-outline">Login Admin</button>
        <button id="btn-logout" class="btn btn-outline admin-only">Sair</button>
      </div>
    </nav>

    <main id="canvas-board" class="canvas-board"></main>

    <div id="modal-login" class="modal hidden">
      <div class="modal-content glass-panel">
        <span class="close-modal" id="close-login">&times;</span>
        <h2>Acesso Restrito</h2>
        <form id="form-login">
          <div class="input-group">
            <label>E-mail</label>
            <input
              type="email"
              id="login-email"
              required
              placeholder="admin@meli.com"
            />
          </div>
          <div class="input-group">
            <label>Senha</label>
            <input
              type="password"
              id="login-password"
              required
              placeholder="••••••••"
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>

    <div id="modal-add" class="modal hidden">
      <div class="modal-content glass-panel modal-large">
        <span class="close-modal" id="close-add">&times;</span>
        <h2 id="modal-add-title">Adicionar Novo Processo</h2>
        <form id="form-add-card">
          <input type="hidden" id="card-id" value="" />

          <div class="input-group">
            <label>Título da Rotina</label>
            <input
              type="text"
              id="card-title"
              required
              placeholder="Ex: 7. Troubleshooting de Coletores"
            />
          </div>

          <div class="input-group">
            <label>Links Úteis (Opcionais)</label>
            <div id="dynamic-links-container"></div>
            <button
              type="button"
              id="btn-add-link"
              class="btn btn-outline w-100"
              style="margin-top: 0.5rem; border-style: dashed"
            >
              <i class="ph ph-link"></i> + Adicionar Link
            </button>
          </div>

          <div class="input-group" style="margin-bottom: 4rem">
            <label>Conteúdo</label>
            <div id="editor-container"></div>
          </div>
          <button
            type="submit"
            class="btn btn-primary w-100"
            id="btn-save-card"
          >
            Salvar Rotina
          </button>
        </form>
      </div>
    </div>

    <div id="modal-delete" class="modal hidden">
      <div
        class="modal-content glass-panel"
        style="max-width: 400px; text-align: center"
      >
        <i
          class="ph ph-warning-circle"
          style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem"
        ></i>
        <h2>Excluir Rotina?</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem">
          Esta ação é permanente e não poderá ser desfeita.
        </p>
        <input type="hidden" id="delete-card-id" value="" />
        <div style="display: flex; gap: 1rem">
          <button
            type="button"
            id="btn-cancel-delete"
            class="btn btn-outline w-100"
          >
            Cancelar
          </button>
          <button
            type="button"
            id="btn-confirm-delete"
            class="btn btn-primary w-100"
            style="background-color: #ef4444; border-color: #ef4444"
          >
            Excluir
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
